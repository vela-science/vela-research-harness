  <g transform="translate(54 386)">
    <circle cx="8" cy="8" r="8" fill="#4F8F8B"/>
    <text x="30" y="14" fill="#D6DCE5" font-family="Inter, Arial, sans-serif" font-size="16">Verifier success is evidence, not scientific acceptance.</text>
  </g>
  <text x="54" y="456" fill="#7F8CA0" font-family="IBM Plex Mono, Menlo, monospace" font-size="13">worker ≠ verifier ≠ signer · exact roots · clean-clone replay · human authority remains outside the model</text>
</svg>
