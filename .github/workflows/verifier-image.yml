name: Verifier image candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - containers/verifier/**
      - .github/workflows/verifier-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: containers/verifier/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/vela-science/canopus-verifier:profile-v2-candidate
            ghcr.io/vela-science/canopus-verifier:sha-${{ github.sha }}
      - name: Record immutable multi-platform digest
        run: echo "ghcr.io/vela-science/canopus-verifier@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
