name: Formal verifier image candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - capsules/formal-erdos-505-test-dim-one/**
      - containers/formal-erdos-505/**
      - .github/workflows/formal-verifier-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: containers/formal-erdos-505/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/vela-science/canopus-formal-verifier:erdos-505-candidate
            ghcr.io/vela-science/canopus-formal-verifier:sha-${{ github.sha }}
      - name: Record immutable image digest
        run: echo "ghcr.io/vela-science/canopus-formal-verifier@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
