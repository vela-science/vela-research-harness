name: Formal verifier image candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - capsules/formal-erdos-505-test-dim-one/**
      - containers/formal-erdos-505/**
      - .github/workflows/formal-verifier-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: containers/formal-erdos-505/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/vela-science/canopus-formal-verifier:erdos-505-candidate
            ghcr.io/vela-science/canopus-formal-verifier:sha-${{ github.sha }}
      - name: Record immutable image digest
        run: echo "ghcr.io/vela-science/canopus-formal-verifier@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
