name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Verify released Vela composition
        env:
          VELA_SHA256: 08703dfe5193755a0a2feaafe34576f68c2769377f428e5cc7a779418b7958b9
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/vela-science/vela/releases/download/v0.800.22/vela-macos-aarch64 \
            --output "$RUNNER_TEMP/vela"
          printf '%s  %s\n' "$VELA_SHA256" "$RUNNER_TEMP/vela" | shasum -a 256 -c -
          chmod +x "$RUNNER_TEMP/vela"
          CANOPUS_VELA_BIN="$RUNNER_TEMP/vela" \
            CANOPUS_VELA_SHA256="sha256:$VELA_SHA256" \
            node --test dist/tests/integration/released-vela.test.js
      - run: pnpm pack:check
