<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Canopus bounded research flow</title>
  <desc id="desc">A Vela work offer becomes a bounded Codex mission, a frozen artifact, independent verification, and a Receipt routed by signed policy.</desc>
  <rect width="1280" height="520" rx="28" fill="#081224"/>
  <path d="M0 390C235 300 414 478 639 368C854 263 1019 346 1280 212V520H0V390Z" fill="#111827"/>
  <g transform="translate(54 42) scale(.12)">
    <path fill="#F7F6F2" d="M80 650 C300 646 560 610 800 82 C742 286 638 506 520 650 Z"/>
    <path fill="#F7F6F2" d="M520 650 C628 590 724 392 800 82 C770 322 734 516 690 650 Z"/>
    <path stroke="#F7F6F2" stroke-linecap="round" stroke-width="12" d="M818 116 L818 650"/>
    <path stroke="#C9A664" stroke-linecap="round" stroke-width="12" d="M65 657 C320 651 585 623 915 670"/>
  </g>
  <text x="174" y="88" fill="#F7F6F2" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6">CANOPUS</text>
  <text x="54" y="146" fill="#C9A664" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600" letter-spacing="3">BOUNDED RESEARCH FOR CODEX</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(54 212)">
      <rect width="188" height="112" rx="16" fill="#111827" stroke="#344258"/>
      <text x="22" y="43" fill="#C9A664" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">01 · SELECT</text>
      <text x="22" y="76" fill="#F7F6F2" font-size="20" font-weight="650">Exact Vela offer</text>
      <text x="22" y="99" fill="#AAB5C6" font-size="13">packet + roots bound</text>
    </g>
    <path d="M250 268H281" stroke="#C9A664" stroke-width="2"/>
    <path d="M274 262L282 268L274 274" stroke="#C9A664" stroke-width="2" fill="none"/>

    <g transform="translate(290 212)">
      <rect width="188" height="112" rx="16" fill="#111827" stroke="#344258"/>
      <text x="22" y="43" fill="#C9A664" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">02 · PRODUCE</text>
      <text x="22" y="76" fill="#F7F6F2" font-size="20" font-weight="650">Codex mission</text>
      <text x="22" y="99" fill="#AAB5C6" font-size="13">bounded native worker</text>
    </g>
    <path d="M486 268H517" stroke="#C9A664" stroke-width="2"/>
    <path d="M510 262L518 268L510 274" stroke="#C9A664" stroke-width="2" fill="none"/>

    <g transform="translate(526 212)">
      <rect width="188" height="112" rx="16" fill="#111827" stroke="#344258"/>
      <text x="22" y="43" fill="#C9A664" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">03 · FREEZE</text>
      <text x="22" y="76" fill="#F7F6F2" font-size="20" font-weight="650">Artifact</text>
      <text x="22" y="99" fill="#AAB5C6" font-size="13">immutable candidate bytes</text>
    </g>
    <path d="M722 268H753" stroke="#C9A664" stroke-width="2"/>
    <path d="M746 262L754 268L746 274" stroke="#C9A664" stroke-width="2" fill="none"/>

    <g transform="translate(762 212)">
      <rect width="188" height="112" rx="16" fill="#111827" stroke="#4F8F8B"/>
      <text x="22" y="43" fill="#4F8F8B" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">04 · VERIFY</text>
      <text x="22" y="76" fill="#F7F6F2" font-size="20" font-weight="650">Independent check</text>
      <text x="22" y="99" fill="#AAB5C6" font-size="13">no network · no writes</text>
    </g>
    <path d="M958 268H989" stroke="#C9A664" stroke-width="2"/>
    <path d="M982 262L990 268L982 274" stroke="#C9A664" stroke-width="2" fill="none"/>

    <g transform="translate(998 212)">
      <rect width="228" height="112" rx="16" fill="#111827" stroke="#C9A664"/>
      <text x="22" y="43" fill="#C9A664" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">05 · LAND</text>
      <text x="22" y="76" fill="#F7F6F2" font-size="20" font-weight="650">Receipt v1</text>
      <text x="22" y="99" fill="#AAB5C6" font-size="13">Permit or protected review</text>
    </g>
