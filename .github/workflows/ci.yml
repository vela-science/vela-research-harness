name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            archive: vela-macos-aarch64.zip
            archive_sha256: be1caed8eb9c7c69c0d60e1140ba5056f983a5f84802496d7dd8447b43abf2d9
            binary_sha256: 5510efe75ec202f2b023de4baf72c64c3b21d6017f55d990147b651bce96c6f2
          - runner: ubuntu-24.04
            archive: vela-linux-x86_64.tar.gz
            archive_sha256: faaec7d8d7503b5addd67d8b25fb18fb1abf4fbd24f6a41957fd7653e0be2502
            binary_sha256: de0ec138fcd2af0212640f67e0c185f67c5036e9b2539bfc776d8c2882ebc0fc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - name: Run platform-appropriate checks
        run: |
          if [ "${{ runner.os }}" = macOS ]; then
            bun run check
          else
            bun run typecheck
            bun run build
            node --test \
              dist/tests/engine-tools.test.js \
              dist/tests/mission-v1.test.js \
              dist/tests/product-cli.test.js \
              dist/tests/product-profile.test.js
          fi
      - name: Verify released Vela composition
        env:
          VELA_ARCHIVE: ${{ matrix.archive }}
          VELA_ARCHIVE_SHA256: ${{ matrix.archive_sha256 }}
          VELA_SHA256: ${{ matrix.binary_sha256 }}
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/vela-science/vela/releases/download/v0.912.0/$VELA_ARCHIVE" \
            --output "$RUNNER_TEMP/$VELA_ARCHIVE"
          printf '%s  %s\n' "$VELA_ARCHIVE_SHA256" "$RUNNER_TEMP/$VELA_ARCHIVE" \
            | shasum -a 256 -c -
          mkdir "$RUNNER_TEMP/vela-release"
          if [ "${{ runner.os }}" = macOS ]; then
            unzip -q "$RUNNER_TEMP/$VELA_ARCHIVE" -d "$RUNNER_TEMP/vela-release"
          else
            tar -xzf "$RUNNER_TEMP/$VELA_ARCHIVE" -C "$RUNNER_TEMP/vela-release"
          fi
          printf '%s  %s\n' "$VELA_SHA256" "$RUNNER_TEMP/vela-release/vela" \
            | shasum -a 256 -c -
          chmod +x "$RUNNER_TEMP/vela-release/vela"
          "$RUNNER_TEMP/vela-release/vela" --version
          if [ "${{ runner.os }}" = macOS ]; then
            CANOPUS_VELA_BIN="$RUNNER_TEMP/vela-release/vela" \
              CANOPUS_VELA_SHA256="sha256:$VELA_SHA256" \
              node --test dist/tests/integration/released-vela.test.js
          fi
      - name: Run real Linux sandbox custody preflight
        if: runner.os == 'Linux'
        env:
          CODEX_TARBALL_SHA256: b6752eb2e8c10e6fcc96ac5c1c8ad8342cdb9a74504fb84686addf081a7d2868
          CODEX_BINARY_SHA256: a31ae9450a26216eb1e7c53102fd42123dd675974310b0e2ca3aa4cb622a2c15
        run: |
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils bubblewrap
          sudo install -m 0644 \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
          curl --fail --location --silent --show-error \
            "https://registry.npmjs.org/@openai/codex/-/codex-0.144.6-linux-x64.tgz" \
            --output "$RUNNER_TEMP/codex-0.144.6-linux-x64.tgz"
          printf '%s  %s\n' "$CODEX_TARBALL_SHA256" \
            "$RUNNER_TEMP/codex-0.144.6-linux-x64.tgz" | shasum -a 256 -c -
          mkdir "$RUNNER_TEMP/codex-0.144.6-linux-x64"
          tar -xzf "$RUNNER_TEMP/codex-0.144.6-linux-x64.tgz" \
            -C "$RUNNER_TEMP/codex-0.144.6-linux-x64"
          codex_bin="$RUNNER_TEMP/codex-0.144.6-linux-x64/package/vendor/x86_64-unknown-linux-musl/bin/codex"
          printf '%s  %s\n' "$CODEX_BINARY_SHA256" "$codex_bin" | shasum -a 256 -c -
          chmod +x "$codex_bin"
          test "$("$codex_bin" --version)" = "codex-cli 0.144.6"
          node scripts/run-native-sandbox-preflight.mjs --codex "$codex_bin"
      - name: Pull frozen verifier anonymously by exact digest
        if: runner.os == 'Linux'
        env:
          VERIFIER_IMAGE: ghcr.io/vela-science/canopus-verifier@sha256:a6f354862f2a3f7d72eb99244c65fa8583c98b74e17e3d5ce6e31ef48aa16536
        run: |
          export DOCKER_CONFIG="$RUNNER_TEMP/anonymous-docker-config"
          mkdir "$DOCKER_CONFIG"
          docker pull "$VERIFIER_IMAGE"
          docker image inspect --format '{{json .RepoDigests}}' "$VERIFIER_IMAGE" \
            | grep -F 'ghcr.io/vela-science/canopus-verifier@sha256:a6f354862f2a3f7d72eb99244c65fa8583c98b74e17e3d5ce6e31ef48aa16536'
      - name: Exercise formal verifier image and reject a type-invalid proof
        if: runner.os == 'Linux'
        run: |
          image=$(node -e 'const p=require("./profiles/formal-erdos-505-test-dim-one-gpt56.json"); console.log(p.platforms["linux-x86_64"].verifier_image)')
          platform=$(node -e 'const p=require("./profiles/formal-erdos-505-test-dim-one-gpt56.json"); console.log(p.platforms["linux-x86_64"].verifier_platform)')
          export DOCKER_CONFIG="$RUNNER_TEMP/formal-anonymous-docker-config"
          mkdir "$DOCKER_CONFIG"
          docker pull --platform "$platform" "$image"
          set +e
          output=$(docker run \
            --platform "$platform" \
            --rm \
            --read-only \
            --network=none \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --memory=1024m \
            --cpus=1 \
            --pids-limit=64 \
            --env HOME=/nonexistent \
            --mount "type=bind,src=$PWD/capsules/formal-erdos-505-test-dim-one/verifier,dst=/capsule/verifier,readonly" \
            --mount "type=bind,src=$PWD/tests/fixtures/formal-verifier/type-mismatch.lean,dst=/candidate.lean,readonly" \
            "$image" /capsule/verifier /candidate.lean 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 1
          printf '%s\n' "$output" | grep -Fiq 'type mismatch'
      - name: Install and smoke the packed product
        run: |
          mkdir "$RUNNER_TEMP/canopus-package"
          bun pm pack --destination "$RUNNER_TEMP/canopus-package"
          set -- "$RUNNER_TEMP"/canopus-package/*.tgz
          test "$#" -eq 1
          npm install --global --prefix "$RUNNER_TEMP/canopus-install" "$1"
          canopus="$RUNNER_TEMP/canopus-install/bin/canopus"
          "$canopus" --help
          "$canopus" profile list
          "$canopus" profile validate erdos1056-k15-10428401-10428600
          "$canopus" profile validate formal-erdos-505-test-dim-one-gpt56
          "$canopus" profile validate quantum-10-1-4-stabilizer-retry

  windows-read-only:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - name: Verify native Windows platform contracts
        run: node --test dist/tests/product-platform.test.js
      - name: Verify Vela and installed Canopus package
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\vela-windows-x86_64.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/vela-science/vela/releases/download/v0.912.0/vela-windows-x86_64.zip" `
            -OutFile $archive
          if ((Get-FileHash $archive -Algorithm SHA256).Hash.ToLower() -ne `
              "2b7445b0781529b1aca0689744d3aa155fc6e82b1fff360005af54dbbb631145") {
            throw "Vela archive checksum mismatch"
          }
          Expand-Archive $archive "$env:RUNNER_TEMP\vela"
          & "$env:RUNNER_TEMP\vela\vela.exe" --version
          bun pm pack --destination $env:RUNNER_TEMP
          $package = Get-ChildItem "$env:RUNNER_TEMP\vela-science-canopus-*.tgz" | Select-Object -First 1
          npm install --global --prefix "$env:RUNNER_TEMP\canopus" $package.FullName
          & "$env:RUNNER_TEMP\canopus\canopus.cmd" --help
          & "$env:RUNNER_TEMP\canopus\canopus.cmd" profile list
          & "$env:RUNNER_TEMP\canopus\canopus.cmd" profile validate erdos1056-k15-10428401-10428600
          & "$env:RUNNER_TEMP\canopus\canopus.cmd" profile validate formal-erdos-505-test-dim-one-gpt56
          & "$env:RUNNER_TEMP\canopus\canopus.cmd" profile validate quantum-10-1-4-stabilizer-retry
