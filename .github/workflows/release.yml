name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Verify tag matches package version
        run: test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Pack source-bound package
        run: |
          mkdir release
          pnpm pack --pack-destination release
          shasum -a 256 release/*.tgz > release/SHA256SUMS
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: release/*.tgz
      - name: Verify the exact GitHub build attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -- release/*.tgz
          test "$#" -eq 1
          gh attestation verify "$1" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-ref "$GITHUB_REF" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners
      - name: Publish with npm trusted publishing provenance
        run: npm publish release/*.tgz --provenance --access public
      - name: Verify the published npm signature and provenance
        run: |
          package=$(node -p 'require("./package.json").name')
          version=$(node -p 'require("./package.json").version')
          spec="$package@$version"
          predicate=""
          for attempt in 1 2 3 4 5; do
            predicate=$(npm view "$spec" dist.attestations.provenance.predicateType 2>/dev/null || true)
            test -n "$predicate" && break
            sleep 3
          done
          test "$predicate" = "https://slsa.dev/provenance/v1"
          audit_root=$(mktemp -d)
          trap 'rm -rf "$audit_root"' EXIT
          cd "$audit_root"
          npm init -y >/dev/null
          npm install --ignore-scripts --save-exact "$spec" >/dev/null
          npm audit signatures --json --include-attestations > audit.json
          node - "$package" "$version" <<'NODE'
          const fs = require("node:fs");
          const audit = JSON.parse(fs.readFileSync("audit.json", "utf8"));
          if (audit.invalid?.length || audit.missing?.length) process.exit(1);
          if (!audit.verified?.some((entry) =>
            entry.name === process.argv[2] &&
            entry.version === process.argv[3] &&
            entry.attestationBundles?.some((bundle) =>
              bundle.predicateType === "https://slsa.dev/provenance/v1"))) process.exit(1);
          NODE
      - name: Publish matching GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.tgz release/SHA256SUMS --verify-tag --generate-notes
