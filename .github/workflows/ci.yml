name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Verify released Vela composition
        env:
          VELA_ARCHIVE_SHA256: 7e75ed3c86fc5ae46fc236907d6326ae1088548c34e10a5eefa5650c60457894
          VELA_SHA256: d50e119d7c802c18c22a4bf9021802264d4d58f523ad028af46fdd0e7f8a3b32
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/vela-science/vela/releases/download/v0.901.0/vela-macos-aarch64.tar.gz \
            --output "$RUNNER_TEMP/vela-macos-aarch64.tar.gz"
          printf '%s  %s\n' "$VELA_ARCHIVE_SHA256" "$RUNNER_TEMP/vela-macos-aarch64.tar.gz" \
            | shasum -a 256 -c -
          mkdir "$RUNNER_TEMP/vela-release"
          tar -xzf "$RUNNER_TEMP/vela-macos-aarch64.tar.gz" \
            -C "$RUNNER_TEMP/vela-release"
          printf '%s  %s\n' "$VELA_SHA256" "$RUNNER_TEMP/vela-release/vela" \
            | shasum -a 256 -c -
          chmod +x "$RUNNER_TEMP/vela-release/vela"
          CANOPUS_VELA_BIN="$RUNNER_TEMP/vela-release/vela" \
            CANOPUS_VELA_SHA256="sha256:$VELA_SHA256" \
            node --test dist/tests/integration/released-vela.test.js
      - run: pnpm pack:check
